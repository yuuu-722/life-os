<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="theme-color" content="#2B7FD4">
<title>Life OS</title>
<link rel="manifest" href="#" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c1:#2B7FD4;--c2:#5BAEE8;--c3:#E8F3FB;
  --bg:#EEF4FB;--bg3:#FFFFFF;
  --border:#D6E8F5;--border2:#C2D9EE;
  --text:#1A2E42;--text2:#4A6B85;--text3:#8AADC5;
  --red:#E05C5C;--green:#3BAD7A;--warn:#E8A020;
  --r:14px;--r-sm:9px;
  --font:'DM Sans',sans-serif;--font-d:'Playfair Display',serif;
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
.app{display:grid;grid-template-columns:220px 1fr;height:100dvh;overflow:hidden}
/* Sidebar */
.sidebar{background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:22px 18px 16px;border-bottom:1px solid var(--border);background:var(--c1)}
.sb-logo{font-family:var(--font-d);font-size:21px;color:#fff;font-style:italic}
.sb-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-name{font-size:11px;color:rgba(255,255,255,.8);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-auth{font-size:10px;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;flex-shrink:0}
.sb-auth:hover{color:#fff}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{margin-bottom:14px}
.nav-lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--c3);color:var(--c1)}
.nav-item.active{background:var(--c3);color:var(--c1);font-weight:500}
.nav-item .ni{width:15px;text-align:center;font-size:13px}
.sb-bottom{padding:10px 14px;border-top:1px solid var(--border)}
.sb-settings{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);cursor:pointer;padding:7px 6px;border-radius:var(--r-sm);transition:all .15s}
.sb-settings:hover{color:var(--c1);background:var(--c3)}
/* Main */
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 22px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left .page-title{font-family:var(--font-d);font-size:19px;font-style:italic}
.topbar-left .page-date{font-size:11px;color:var(--text3);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:22px 26px}
.page{display:none}.page.active{display:block}
/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-lbl{font-size:11px;color:var(--text3);margin-bottom:3px}
.stat-val{font-size:21px;font-weight:300}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* Progress */
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0 3px}
.prog-fill{height:100%;border-radius:2px;background:var(--c1);transition:width .5s}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
/* Chart */
.chart-wrap{height:70px;margin:8px 0 4px}
.chart-wrap svg{width:100%;height:100%}
/* Tasks */
.task-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-cb{width:17px;height:17px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.task-cb.done{background:var(--green);border-color:var(--green)}
.task-cb.done::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.task-cb.repeat{border-color:var(--c1);border-style:dashed}
.task-body{flex:1;min-width:0}
.task-name{font-size:13.5px;line-height:1.4}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-meta{font-size:11px;color:var(--text3);margin-top:2px}
.task-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;background:var(--c3);color:var(--c1);margin-left:4px}
.task-repeat-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:20px;background:rgba(43,127,212,.1);color:var(--c1);border:1px solid rgba(43,127,212,.2)}
.task-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-item:hover .task-actions{opacity:1}
.task-act-btn{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:3px}
.task-act-btn:hover{background:var(--border);color:var(--text)}
.task-act-btn.del:hover{color:var(--red)}
/* Project cards */
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;transition:border-color .2s,box-shadow .15s}
.proj-card:hover{border-color:var(--c2);box-shadow:0 2px 10px rgba(43,127,212,.07)}
.proj-emoji{font-size:19px;margin-bottom:7px}
.proj-name{font-size:13.5px;font-weight:500;margin-bottom:2px}
.proj-meta{font-size:11px;color:var(--text3)}
.proj-bar{height:2px;background:var(--border);border-radius:1px;margin-top:9px}
.proj-fill{height:100%;border-radius:1px;background:var(--c1)}
.proj-status{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:7px}
.s-active{background:rgba(43,127,212,.1);color:var(--c1)}
.s-plan{background:rgba(91,174,232,.1);color:var(--c2)}
.s-done{background:rgba(59,173,122,.1);color:var(--green)}
.card-actions{display:flex;gap:5px;position:absolute;top:8px;right:8px;opacity:0;transition:opacity .15s}
.proj-card:hover .card-actions,.vision-card:hover .card-actions,.vac:hover .card-actions{opacity:1}
.ca-btn{font-size:10px;padding:2px 7px;border-radius:4px;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.ca-btn:hover{border-color:var(--c1);color:var(--c1)}
.ca-del{color:var(--red);border-color:rgba(224,92,92,.3)}
.ca-del:hover{background:rgba(224,92,92,.05);border-color:var(--red)}
/* Vision */
.vision-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:border-color .2s;position:relative}
.vision-card:hover{border-color:var(--c1)}
.vision-icon{font-size:22px;margin-bottom:7px}
.vision-title{font-size:13.5px;font-weight:500;margin-bottom:2px}
.vision-year{font-size:11px;color:var(--c1);font-weight:500}
.vision-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5}
/* VAC */
.vac{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative}
.vac-name{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.vac-bal{font-size:19px;font-weight:300}
.vac-sub{font-size:11px;color:var(--text3);margin-top:1px}
.vac-goals{margin-top:9px;border-top:1px solid var(--border);padding-top:7px}
.vac-goal{margin-bottom:5px}
.vac-goal-hd{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.vac-gbar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.vac-gfill{height:100%;background:var(--c1);border-radius:1px}
/* Expenses */
.exp-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border-bottom:none}
.exp-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--c3)}
.exp-icon.in-icon{background:rgba(59,173,122,.1)}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-detail{font-size:10px;color:var(--text3);margin-top:1px}
.exp-amt{font-size:13px;font-weight:500;color:var(--red);white-space:nowrap}
.exp-amt.in{color:var(--green)}
.exp-acts{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.exp-row:hover .exp-acts{opacity:1}
/* Acc row */
.acc-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.acc-row:last-child{border-bottom:none}
.acc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.acc-name{flex:1;font-size:13px}
.acc-code{font-size:10px;color:var(--text3);margin-left:3px}
.acc-val{font-size:13px;font-weight:500}
/* Alert */
.alert-box{background:rgba(43,127,212,.06);border:1px solid rgba(43,127,212,.2);border-radius:var(--r-sm);padding:10px 13px;font-size:12px;color:var(--c1);line-height:1.6;margin-bottom:7px}
/* Total strip */
.total-strip{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0 0;border-top:1px solid var(--border2);margin-top:7px}
.total-lbl{font-size:12px;color:var(--text3)}
.total-val{font-family:var(--font-d);font-size:21px;color:var(--c1)}
/* Tabs */
.tab-nav{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{padding:7px 13px;font-size:12.5px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab-btn:hover{color:var(--c1)}
.tab-btn.active{color:var(--c1);border-bottom-color:var(--c1)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* Buttons */
.btn{padding:7px 15px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.btn:hover{border-color:var(--c1);color:var(--c1)}
.btn-primary{background:var(--c1);color:#fff;border-color:var(--c1)}
.btn-primary:hover{background:var(--c2);border-color:var(--c2);color:#fff}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(224,92,92,.3)}
.btn-danger:hover{background:rgba(224,92,92,.05);border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.icon-btn{padding:3px 9px;border-radius:var(--r-sm);font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.icon-btn:hover{border-color:var(--c1);color:var(--c1)}
.icon-btn.del{color:var(--red);border-color:rgba(224,92,92,.25)}
.icon-btn.del:hover{background:rgba(224,92,92,.05)}
/* Toggle */
.toggle-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:10px}
.toggle{width:34px;height:18px;background:var(--border2);border-radius:9px;position:relative;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--c1)}
.toggle::after{content:'';width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(16px)}
/* Forms */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;color:var(--text3);font-weight:500}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13.5px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--c1)}
.input-row{display:flex;gap:8px}.input-row .field{flex:1}
.quick-add{display:flex;gap:7px;margin-top:9px}
.quick-add input{flex:1}
.quick-add button{padding:7px 13px;background:var(--c1);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,46,66,.4);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:22px;width:420px;max-width:calc(100vw - 24px);max-height:90dvh;overflow-y:auto;box-shadow:0 14px 44px rgba(43,127,212,.12)}
.modal-title{font-family:var(--font-d);font-size:18px;margin-bottom:14px}
.modal-actions{display:flex;gap:7px;margin-top:14px}
.modal-actions .btn{flex:1}
/* Settings */
.settings-section{margin-bottom:22px}
.settings-title{font-size:11px;font-weight:500;color:var(--text);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border);letter-spacing:.05em;text-transform:uppercase}
.settings-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-info{flex:1}
.settings-row-lbl{font-size:13px}
.settings-row-sub{font-size:11px;color:var(--text3);margin-top:1px}
.settings-row-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
/* Scheme card */
.scheme-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;margin-bottom:7px}
.scheme-card.default-scheme{border-color:var(--c1);background:rgba(43,127,212,.03)}
.scheme-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:2px}
.scheme-badge{font-size:9px;padding:1px 5px;border-radius:20px;background:var(--c1);color:#fff}
.scheme-desc{font-size:11px;color:var(--text3)}
.scheme-actions{display:flex;gap:5px;margin-top:7px}
/* Heatmap */
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap{display:flex;gap:2px}
.heatmap-col{display:flex;flex-direction:column;gap:2px}
.heatmap-cell{width:11px;height:11px;border-radius:2px;background:var(--border)}
.heatmap-cell.l1{background:rgba(43,127,212,.2)}
.heatmap-cell.l2{background:rgba(43,127,212,.45)}
.heatmap-cell.l3{background:rgba(43,127,212,.7)}
.heatmap-cell.l4{background:var(--c1)}
.heatmap-months{display:flex;gap:2px;margin-bottom:3px;padding-left:0}
.hm-month{font-size:9px;color:var(--text3)}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(43,127,212,.08);border:1px solid rgba(43,127,212,.2);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--c1);font-weight:500}
/* Habit card */
.habit-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.habit-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.habit-name{font-size:14px;font-weight:500}
.habit-freq{font-size:11px;color:var(--text3);margin-top:1px}
.habit-check-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.habit-check{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);transition:all .15s;flex-direction:column;gap:1px}
.habit-check.done{background:var(--c1);border-color:var(--c1);color:#fff}
.habit-check-day{font-size:9px}
/* Mobile nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border);padding:5px 0;padding-bottom:max(5px,var(--safe-bot));z-index:100}
.mn-inner{display:flex;justify-content:space-around}
.mn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;cursor:pointer;font-size:9px;color:var(--text3);border-radius:var(--r-sm)}
.mn-item.active{color:var(--c1)}
.mn-icon{font-size:19px}
/* Login */
.login-screen{position:fixed;inset:0;background:var(--c1);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:18px;padding:24px}
.login-logo{font-family:var(--font-d);font-size:42px;color:#fff;font-style:italic}
.login-sub{font-size:14px;color:rgba(255,255,255,.72);text-align:center;line-height:1.7;white-space:pre-line}
.login-btn{display:flex;align-items:center;gap:11px;background:#fff;color:var(--text);padding:13px 26px;border-radius:50px;font-size:14.5px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);box-shadow:0 5px 20px rgba(0,0,0,.14);transition:transform .15s}
.login-btn:hover{transform:translateY(-1px)}
.login-btn svg{width:18px;height:18px}
.login-offline{font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;text-decoration:underline}
.login-loading{font-size:13px;color:rgba(255,255,255,.65);display:none}
.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:30px;margin-bottom:7px;opacity:.3}
/* Lang */
.lang-switch{display:flex;gap:5px}
.lang-btn{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.lang-btn.active{background:var(--c1);color:#fff;border-color:var(--c1)}
/* Income result */
.alloc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.alloc-row:last-child{border-bottom:none}
.alloc-name{font-size:13px;color:var(--text2)}
.alloc-pct{font-size:10px;color:var(--text3)}
.alloc-amt{font-size:13px;font-weight:500;color:var(--c1)}
.alloc-amt.special{color:var(--green)}
/* Weekday picker */
.weekday-picker{display:flex;gap:4px;flex-wrap:wrap}
.wd-btn{padding:4px 8px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.wd-btn.selected{background:var(--c1);color:#fff;border-color:var(--c1)}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.page.active>*{animation:fadeUp .2s ease both}
.page.active>*:nth-child(2){animation-delay:.04s}
.page.active>*:nth-child(3){animation-delay:.08s}
/* Responsive */
@media(max-width:768px){
  .app{grid-template-columns:1fr}.sidebar{display:none}
  .topbar{padding:9px 14px;padding-top:max(9px,var(--safe-top))}
  .content{padding:12px 12px 88px}
  .mobile-nav{display:block}
  .g2,.g3{grid-template-columns:1fr}
  .g-auto{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .task-actions{opacity:1}.card-actions{opacity:1;position:static;margin-top:7px}.exp-acts{opacity:1}
}
@media(min-width:769px){.topbar{display:none}.content{padding:22px 26px}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-logo">Life OS</div>
  <div class="login-sub" id="login-sub"></div>
  <button class="login-btn" id="loginBtn" onclick="doSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="login-google-text"></span>
  </button>
  <div class="login-loading" id="loginLoading"></div>
  <div class="login-offline" id="login-offline" onclick="skipLogin()"></div>
</div>

<div class="app" id="appShell" style="display:none">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">Life OS</div>
      <div class="sb-sub" id="sb-sub"></div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-av">?</div>
        <div class="sb-name" id="sb-nm"></div>
        <div class="sb-auth" id="sb-auth" onclick="handleAuth()"></div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-sec">
        <div class="nav-lbl" id="nav-lbl-daily"></div>
        <div class="nav-item active" onclick="nav('home')"><span class="ni">⌂</span><span id="nav-home"></span></div>
        <div class="nav-item" onclick="nav('habits')"><span class="ni">◉</span><span id="nav-habits"></span></div>
        <div class="nav-item" onclick="nav('tasks')"><span class="ni">✓</span><span id="nav-tasks"></span></div>
      </div>
      <div class="nav-sec">
        <div class="nav-lbl" id="nav-lbl-plans"></div>
        <div class="nav-item" onclick="nav('projects')"><span class="ni">◈</span><span id="nav-projects"></span></div>
        <div class="nav-item" onclick="nav('visions')"><span class="ni">◎</span><span id="nav-visions"></span></div>
      </div>
      <div class="nav-sec">
        <div class="nav-lbl" id="nav-lbl-finance"></div>
        <div class="nav-item" onclick="nav('cashflow')"><span class="ni">⬡</span><span id="nav-cashflow"></span></div>
        <div class="nav-item" onclick="nav('assets')"><span class="ni">△</span><span id="nav-assets"></span></div>
        <div class="nav-item" onclick="nav('income')"><span class="ni">↑</span><span id="nav-income"></span></div>
      </div>
    </nav>
    <div class="sb-bottom">
      <div class="sb-settings" onclick="nav('settings')">⚙ <span id="nav-settings"></span></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="tb-title"></div>
        <div class="page-date" id="tb-date"></div>
      </div>
      <button class="btn btn-primary btn-sm" id="tb-btn" onclick="topbarAct()" style="display:none"></button>
    </div>
    <div class="content">

      <!-- HOME -->
      <div id="page-home" class="page active">
        <div class="g2" style="margin-bottom:10px">
          <div class="stat"><div class="stat-lbl" id="h-lbl-tasks"></div><div class="stat-val" id="h-tasks">—</div><div class="stat-sub" id="h-sub-tasks"></div></div>
          <div class="stat"><div class="stat-lbl" id="h-lbl-assets"></div><div class="stat-val" id="h-assets">—</div><div class="stat-sub" id="h-pct"></div></div>
        </div>
        <div class="card">
          <div class="card-hd"><span class="card-title" id="h-today-title"></span><span id="h-task-count" style="font-size:11px;color:var(--text3)"></span></div>
          <div id="home-tasks"></div>
          <div class="quick-add"><input type="text" id="h-ti" onkeydown="if(event.key==='Enter')quickTask()"><button onclick="quickTask()" id="h-add-btn"></button></div>
        </div>
        <div class="card-title" id="h-habits-title" style="margin:4px 0 8px"></div>
        <div id="h-habits-today" style="margin-bottom:10px"></div>
        <div class="card-title" id="h-projs-title" style="margin-bottom:8px"></div>
        <div class="g-auto" id="h-projs" style="margin-bottom:10px"></div>
        <div class="card-title" id="h-alerts-title" style="margin-bottom:7px"></div>
        <div id="h-alerts" style="margin-bottom:10px"></div>
        <div class="card">
          <div class="card-hd"><span class="card-title" id="h-growth-title"></span><span style="font-size:11px;color:var(--text3)" id="h-target-lbl"></span></div>
          <div class="chart-wrap"><svg id="asset-svg" viewBox="0 0 400 60" preserveAspectRatio="none" fill="none"></svg></div>
          <div class="prog-bar"><div class="prog-fill" id="h-prog" style="width:0%"></div></div>
          <div class="prog-meta"><span>0</span><span id="h-prog-pct"></span><span id="h-prog-target"></span></div>
        </div>
        <div class="g3" style="margin-top:10px" id="h-visions"></div>
      </div>

      <!-- HABITS -->
      <div id="page-habits" class="page">
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" id="btn-new-habit" onclick="openModal('habit-modal')"></button>
          <div class="toggle-row" style="margin-bottom:0" onclick="toggleShowDoneHabits()">
            <div class="toggle" id="toggle-done-habits"></div>
            <span id="lbl-show-done-habits"></span>
          </div>
        </div>
        <div id="habit-list"></div>
      </div>

      <!-- TASKS -->
      <div id="page-tasks" class="page">
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" id="btn-new-task" onclick="openModal('task-modal')"></button>
          <button class="btn btn-sm" id="btn-f-pending" onclick="filterTasks('undone',this)"></button>
          <button class="btn btn-sm" id="btn-f-today" onclick="filterTasks('today',this)"></button>
          <button class="btn btn-sm" id="btn-f-done" onclick="filterTasks('done',this)"></button>
          <div class="toggle-row" style="margin-bottom:0" onclick="toggleShowDoneTasks()">
            <div class="toggle" id="toggle-done-tasks"></div>
            <span id="lbl-show-done"></span>
          </div>
        </div>
        <div class="card" id="task-list"></div>
      </div>

      <!-- PROJECTS -->
      <div id="page-projects" class="page">
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" id="btn-new-proj" onclick="openModal('proj-modal')"></button>
          <div class="toggle-row" style="margin-bottom:0" onclick="toggleShowDoneProj()">
            <div class="toggle" id="toggle-done-proj"></div>
            <span id="lbl-show-done-proj"></span>
          </div>
        </div>
        <div class="g-auto" id="proj-grid"></div>
      </div>

      <!-- VISIONS -->
      <div id="page-visions" class="page">
        <div class="btn-row"><button class="btn btn-primary btn-sm" id="btn-new-vision" onclick="openModal('vision-modal')"></button></div>
        <div class="g3" id="vision-grid"></div>
      </div>

      <!-- CASHFLOW -->
      <div id="page-cashflow" class="page">
        <div class="tab-nav">
          <button class="tab-btn active" id="cf-tab-accts" onclick="cfTab('accounts',this)"></button>
          <button class="tab-btn" id="cf-tab-tx" onclick="cfTab('transactions',this)"></button>
          <button class="tab-btn" id="cf-tab-goals" onclick="cfTab('goals',this)"></button>
        </div>
        <div id="cf-accounts" class="tab-panel active">
          <div class="btn-row">
            <button class="btn btn-sm" id="btn-deposit" onclick="openModal('deposit-modal')"></button>
            <button class="btn btn-sm btn-primary" id="btn-new-tx" onclick="openModal('expense-modal')"></button>
          </div>
          <div class="g2" id="vac-grid"></div>
        </div>
        <div id="cf-transactions" class="tab-panel">
          <div class="btn-row"><button class="btn btn-sm btn-primary" id="btn-new-tx2" onclick="openModal('expense-modal')"></button></div>
          <div class="card" id="exp-list"></div>
        </div>
        <div id="cf-goals" class="tab-panel">
          <div class="btn-row"><button class="btn btn-sm btn-primary" id="btn-new-goal" onclick="openModal('goal-modal')"></button></div>
          <div id="goals-list"></div>
        </div>
      </div>

      <!-- ASSETS -->
      <div id="page-assets" class="page">
        <div class="btn-row"><button class="btn btn-primary btn-sm" id="btn-update-assets" onclick="openModal('asset-modal')"></button></div>
        <div class="card">
          <div id="asset-list"></div>
          <div class="total-strip"><span class="total-lbl" id="assets-total-lbl"></span><span class="total-val" id="asset-total">—</span></div>
          <div class="prog-bar"><div class="prog-fill" id="asset-prog" style="width:0%"></div></div>
          <div class="prog-meta"><span>0</span><span id="asset-prog-pct"></span><span id="asset-prog-target"></span></div>
        </div>
        <div style="margin-top:12px"><div class="card-title" id="snap-title" style="margin-bottom:7px"></div><div class="card" id="snap-list"></div></div>
      </div>

      <!-- INCOME -->
      <div id="page-income" class="page">
        <div class="card">
          <div class="card-hd"><span class="card-title" id="income-calc-title"></span><select id="inc-scheme" onchange="calcIncome()" style="font-size:12px;padding:3px 8px;width:auto"></select></div>
          <div class="input-row">
            <div class="field"><label id="lbl-amount"></label><input type="number" id="inc-amt" step="any" oninput="calcIncome()" style="font-size:18px;font-weight:300"></div>
            <div class="field"><label id="lbl-source"></label><select id="inc-src" onchange="updateIncTypes();calcIncome()"></select></div>
            <div class="field"><label id="lbl-type"></label><select id="inc-type" onchange="calcIncome()"></select></div>
          </div>
          <div id="inc-rule" style="font-size:11px;color:var(--text3);padding:7px 10px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:11px;line-height:1.7"></div>
          <div id="inc-result"></div>
          <button class="btn btn-primary" id="btn-apply-income" onclick="applyIncome()" style="width:100%;margin-top:11px"></button>
        </div>
        <div style="margin-top:12px"><div class="card-title" id="income-history-title" style="margin-bottom:7px"></div><div class="card" id="income-records"></div></div>
      </div>

      <!-- SETTINGS -->
      <div id="page-settings" class="page">
        <div class="settings-section">
          <div class="settings-title">Language / 語言</div>
          <div class="settings-row">
            <div class="settings-row-info"><div class="settings-row-lbl">Language / 語言</div></div>
            <div class="lang-switch"><div class="lang-btn" id="lang-zh" onclick="setLang('zh')">繁中</div><div class="lang-btn" id="lang-en" onclick="setLang('en')">English</div></div>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-title" id="s-title-colors"></div>
          <div class="settings-row"><div class="settings-row-info"><div class="settings-row-lbl" id="s-lbl-c1"></div></div><div class="settings-row-ctrl"><input type="color" id="sc1" style="width:38px;height:28px;padding:2px;cursor:pointer;border-radius:5px;border:1px solid var(--border2)"></div></div>
          <div class="settings-row"><div class="settings-row-info"><div class="settings-row-lbl" id="s-lbl-c2"></div></div><div class="settings-row-ctrl"><input type="color" id="sc2" style="width:38px;height:28px;padding:2px;cursor:pointer;border-radius:5px;border:1px solid var(--border2)"></div></div>
          <div class="settings-row"><div class="settings-row-info"><div class="settings-row-lbl" id="s-lbl-c3"></div></div><div class="settings-row-ctrl"><input type="color" id="sc3" style="width:38px;height:28px;padding:2px;cursor:pointer;border-radius:5px;border:1px solid var(--border2)"></div></div>
          <button class="btn btn-primary btn-sm" id="btn-apply-colors" style="margin-top:9px" onclick="applyColors()"></button>
        </div>
        <div class="settings-section">
          <div class="settings-title" id="s-title-vac"></div>
          <div id="vac-settings"></div>
          <div style="display:flex;gap:7px;margin-top:9px">
            <button class="btn btn-sm" id="btn-add-vac" onclick="addVAC()"></button>
            <button class="btn btn-primary btn-sm" id="btn-save-vac" onclick="saveVACSettings()"></button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-title" id="s-title-schemes"></div>
          <div id="scheme-settings"></div>
          <button class="btn btn-sm" id="btn-add-scheme" style="margin-top:9px" onclick="addScheme()"></button>
        </div>
        <div class="settings-section">
          <div class="settings-title" id="s-title-assets"></div>
          <div id="asset-settings"></div>
          <div style="display:flex;gap:7px;margin-top:9px">
            <button class="btn btn-sm" id="btn-add-asset" onclick="addAsset()"></button>
            <button class="btn btn-primary btn-sm" id="btn-save-assets" onclick="saveAssetSettings()"></button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-title" id="s-title-target"></div>
          <div class="settings-row">
            <div class="settings-row-info"><div class="settings-row-lbl" id="s-lbl-target"></div></div>
            <div class="settings-row-ctrl"><input type="number" id="s-target" style="width:120px" step="any"></div>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-save-target" style="margin-top:9px" onclick="saveTarget()"></button>
        </div>
        <div class="settings-section">
          <div class="settings-title" id="s-title-account"></div>
          <div class="settings-row">
            <div class="settings-row-info"><div class="settings-row-lbl" id="s-user">—</div><div class="settings-row-sub" id="s-user-sub"></div></div>
            <button class="btn btn-sm" id="s-auth-btn" onclick="handleAuth()"></button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<nav class="mobile-nav" id="mobileNav" style="display:none">
  <div class="mn-inner">
    <div class="mn-item active" onclick="nav('home')"><div class="mn-icon">⌂</div><span id="mn-home"></span></div>
    <div class="mn-item" onclick="nav('habits')"><div class="mn-icon">◉</div><span id="mn-habits"></span></div>
    <div class="mn-item" onclick="nav('cashflow')"><div class="mn-icon">⬡</div><span id="mn-cashflow"></span></div>
    <div class="mn-item" onclick="nav('projects')"><div class="mn-icon">◈</div><span id="mn-projects"></span></div>
    <div class="mn-item" onclick="nav('settings')"><div class="mn-icon">⚙</div><span id="mn-settings"></span></div>
  </div>
</nav>

<!-- MODALS -->
<div class="modal-overlay" id="task-modal"><div class="modal">
  <div class="modal-title" id="task-modal-title"></div>
  <input type="hidden" id="t-edit-id">
  <div class="field"><label id="lbl-t-name"></label><input type="text" id="t-name"></div>
  <div class="input-row">
    <div class="field"><label id="lbl-t-date"></label><input type="date" id="t-date"></div>
    <div class="field"><label id="lbl-t-proj"></label><select id="t-proj"></select></div>
  </div>
  <div class="field"><label id="lbl-t-goal"></label><select id="t-goal"></select></div>
  <div class="field"><label id="lbl-t-tag"></label><input type="text" id="t-tag"></div>
  <div class="settings-row" style="padding:7px 0">
    <div class="settings-row-info"><div class="settings-row-lbl" id="lbl-t-repeat"></div></div>
    <div class="toggle" id="toggle-t-repeat" onclick="toggleTaskRepeat()"></div>
  </div>
  <div id="repeat-settings" style="display:none">
    <div class="field"><label id="lbl-t-freq"></label>
      <select id="t-freq" onchange="updateFreqUI()">
        <option value="daily" id="opt-daily"></option>
        <option value="weekly" id="opt-weekly"></option>
        <option value="monthly" id="opt-monthly"></option>
      </select>
    </div>
    <div id="weekday-picker-wrap" class="field" style="display:none">
      <label id="lbl-t-weekdays"></label>
      <div class="weekday-picker" id="weekday-picker"></div>
    </div>
    <div id="monthday-wrap" class="field" style="display:none">
      <label id="lbl-t-monthday"></label>
      <input type="number" id="t-monthday" min="1" max="31" placeholder="1">
    </div>
    <div class="field"><label id="lbl-t-times"></label><input type="number" id="t-times" min="1" value="1"></div>
  </div>
  <div class="modal-actions">
    <button class="btn" id="btn-task-cancel" onclick="closeModal('task-modal')"></button>
    <button class="btn btn-primary" id="btn-task-save" onclick="saveTask()"></button>
  </div>
</div></div>

<div class="modal-overlay" id="proj-modal"><div class="modal">
  <div class="modal-title" id="proj-modal-title"></div>
  <input type="hidden" id="p-edit-id">
  <div class="input-row">
    <div class="field" style="flex:0 0 58px"><label>Emoji</label><input type="text" id="p-emoji" maxlength="2"></div>
    <div class="field"><label id="lbl-p-name"></label><input type="text" id="p-name"></div>
  </div>
  <div class="input-row">
    <div class="field"><label id="lbl-p-type"></label><select id="p-type"></select></div>
    <div class="field"><label id="lbl-p-status"></label><select id="p-status"></select></div>
  </div>
  <div class="input-row">
    <div class="field"><label id="lbl-p-start"></label><input type="date" id="p-start"></div>
    <div class="field"><label id="lbl-p-end"></label><input type="date" id="p-end"></div>
  </div>
  <div class="field"><label id="lbl-p-prog"></label><input type="number" id="p-prog" min="0" max="100"></div>
  <div class="field"><label id="lbl-p-account"></label><select id="p-account"></select></div>
  <div class="modal-actions">
    <button class="btn" id="btn-proj-cancel" onclick="closeModal('proj-modal')"></button>
    <button class="btn btn-primary" id="btn-proj-save" onclick="saveProject()"></button>
  </div>
</div></div>

<div class="modal-overlay" id="goal-modal"><div class="modal">
  <div class="modal-title" id="goal-modal-title"></div>
  <input type="hidden" id="g-edit-id">
  <div class="field"><label id="lbl-g-name"></label><input type="text" id="g-name"></div>
  <div class="field"><label id="lbl-g-proj"></label><select id="g-proj"></select></div>
  <div class="field"><label id="lbl-g-account"></label><select id="g-account"></select></div>
  <div class="field"><label id="lbl-g-amt"></label><input type="number" id="g-amt" step="any"></div>
  <div class="modal-actions">
    <button class="btn" id="btn-goal-cancel" onclick="closeModal('goal-modal')"></button>
    <button class="btn btn-primary" id="btn-goal-save" onclick="saveGoal()"></button>
  </div>
</div></div>

<div class="modal-overlay" id="vision-modal"><div class="modal">
  <div class="modal-title" id="vision-modal-title"></div>
  <input type="hidden" id="v-edit-id">
  <div class="input-row">
    <div class="field" style="flex:0 0 58px"><label>Emoji</label><input type="text" id="v-emoji" maxlength="2"></div>
    <div class="field"><label id="lbl-v-name"></label><input type="text" id="v-name"></div>
  </div>
  <div class="input-row">
    <div class="field"><label id="lbl-v-year"></label><input type="number" id="v-year"></div>
    <div class="field"><label id="lbl-v-account"></label><select id="v-account"></select></div>
  </div>
  <div class="field"><label id="lbl-v-desc"></label><input type="text" id="v-desc"></div>
  <div class="field"><label id="lbl-v-goal-amt"></label><input type="number" id="v-goal-amt" step="any"></div>
  <div class="modal-actions">
    <button class="btn" id="btn-vision-cancel" onclick="closeModal('vision-modal')"></button>
    <button class="btn btn-primary" id="btn-vision-save" onclick="saveVision()"></button>
  </div>
</div></div>

<div class="modal-overlay" id="expense-modal"><div class="modal">
  <div class="modal-title" id="exp-modal-title"></div>
  <input type="hidden" id="e-edit-id">
  <div class="input-row">
    <div class="field"><label id="lbl-e-type"></label><select id="e-type" onchange="toggleExpType()"></select></div>
    <div class="field"><label id="lbl-e-cat"></label><select id="e-cat"></select></div>
  </div>
  <div class="field"><label id="lbl-e-name"></label><input type="text" id="e-name"></div>
  <div class="input-row">
    <div class="field"><label id="lbl-e-amount"></label><input type="number" id="e-amount" step="any"></div>
    <div class="field"><label id="lbl-e-date"></label><input type="date" id="e-date"></div>
  </div>
  <div class="field" id="e-account-field"><label id="lbl-e-account"></label><select id="e-account"></select></div>
  <div class="field"><label id="lbl-e-note"></label><input type="text" id="e-note"></div>
  <div class="modal-actions">
    <button class="btn" id="btn-exp-cancel" onclick="closeModal('expense-modal')"></button>
    <button class="btn btn-primary" id="btn-exp-save" onclick="saveExpense()"></button>
  </div>
</div></div>

<div class="modal-overlay" id="deposit-modal"><div class="modal">
  <div class="modal-title" id="deposit-modal-title"></div>
  <div class="field"><label id="lbl-dep-acct"></label><select id="dep-acct"></select></div>
  <div class="field"><label id="lbl-dep-amt"></label><input type="number" id="dep-amt" step="any"></div>
  <div class="field"><label id="lbl-dep-note"></label><input type="text" id="dep-note"></div>
  <div class="modal-actions">
    <button class="btn" id="btn-dep-cancel" onclick="closeModal('deposit-modal')"></button>
    <button class="btn btn-primary" id="btn-dep-save" onclick="saveDeposit()"></button>
  </div>
</div></div>

// Pre-expose showApp so module script can call it after page loads
window._showAppQueue = false;
window.showApp = function(){ window._showAppQueue = true; };

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
const cfg={apiKey:"AIzaSyA2rHPAQT-eaJnvoUuNHBZdIo88b0Olhmk",authDomain:"life-os-01-byyu.firebaseapp.com",projectId:"life-os-01-byyu",storageBucket:"life-os-01-byyu.firebasestorage.app",messagingSenderId:"904924111847",appId:"1:904924111847:web:8301a7bf43e13f5ef0d342"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),provider=new GoogleAuthProvider();
const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
// Handle redirect result first
getRedirectResult(auth).catch(e=>console.error(e));

window._doSignIn=async()=>{document.getElementById('loginBtn').style.display='none';document.getElementById('loginLoading').style.display='block';try{if(isMobile){await signInWithRedirect(auth,provider);}else{await signInWithPopup(auth,provider);}}catch(e){console.error(e);document.getElementById('loginBtn').style.display='flex';document.getElementById('loginLoading').style.display='none';}};
window._doSignOut=async()=>{await signOut(auth);updateAuthUI(null);};
window._saveToFB=async(data)=>{if(!window._fbUser)return;try{await setDoc(doc(db,'users',window._fbUser.uid),JSON.parse(JSON.stringify(data)));}catch(e){console.error(e);}};
window._loadFromFB=async(uid)=>{try{const snap=await getDoc(doc(db,'users',uid));if(snap.exists()){const d=snap.data();window.DB={...window.DB,...d};applyTheme();applyLang();renderPage(window._curPage||'home');}}catch(e){console.error(e);}};
function updateAuthUI(user){
  const av=document.getElementById('sb-av'),nm=document.getElementById('sb-nm'),au=document.getElementById('sb-auth'),su=document.getElementById('s-user'),sb=document.getElementById('s-auth-btn');
  if(user){if(av)av.innerHTML=user.photoURL?`<img src="${user.photoURL}">`:(user.displayName?.[0]||'U');if(nm)nm.textContent=user.displayName||user.email;if(au)au.textContent=T('sign_out');if(su)su.textContent=user.displayName||user.email;if(sb)sb.textContent=T('sign_out');}
  else{if(av)av.textContent='?';if(nm)nm.textContent=T('not_signed');if(au)au.textContent=T('sign_in');if(su)su.textContent=T('not_signed');if(sb)sb.textContent=T('sign_in');}
}
onAuthStateChanged(auth,user=>{window._fbUser=user;updateAuthUI(user);if(user){window._loadFromFB(user.uid);document.getElementById('loginScreen').style.display='none';if(typeof showApp==='function')showApp();else if(window.showApp)window.showApp();}});
window.doSignIn=()=>window._doSignIn();
window.handleAuth=()=>window._fbUser?window._doSignOut():window._doSignIn();
</script>

function fillTypeSelects(){
  const src=document.getElementById('inc-src');if(src){const v=src.value;src.innerHTML=`<option value="self">${T('src_self')}</option><option value="parents">${T('src_parents')}</option>`;src.value=v||'self';}
  const pt=document.getElementById('p-type');if(pt){const v=pt.value;pt.innerHTML=`<option value="short">${T('p_short')}</option><option value="long">${T('p_long')}</option>`;pt.value=v||'short';}
  const ps=document.getElementById('p-status');if(ps){const v=ps.value;ps.innerHTML=`<option value="planning">${T('p_planning')}</option><option value="active">${T('p_active')}</option><option value="done">${T('p_done')}</option>`;ps.value=v||'planning';}
  const et=document.getElementById('e-type');if(et){const v=et.value;et.innerHTML=`<option value="expense">${T('tx_out')}</option><option value="income_direct">${T('tx_in')}</option>`;et.value=v||'expense';}

// ═══ HABITS ═══
function isHabitDueToday(h){
  const now=new Date(),dow=now.getDay(),dom=now.getDate();
  if(h.freq==='daily')return true;
  if(h.freq==='weekly')return (h.weekdays||[]).includes(dow);
  if(h.freq==='monthly')return dom===(h.monthday||1);
  return true;
}

function getHabitLogKey(hid,date){return hid+'_'+date;}

function getHabitDoneToday(h){
  const key=getHabitLogKey(h.id,today());
  return DB.habitLogs[key]||0;
}

function habitTodayHTML(h){
  const done=getHabitDoneToday(h),target=h.times||1,pct=Math.min(done/target*100,100);
  return `<div class="card" style="margin-bottom:8px;padding:12px 14px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><span style="font-size:16px;margin-right:6px">${h.emoji||'◉'}</span><span style="font-size:13.5px;font-weight:500">${h.name}</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--text3)">${done}/${target}</span>
        <button class="btn btn-sm ${done>=target?'btn-primary':''}" onclick="checkInHabit('${h.id}')">${done>=target?'✓':'打卡'}</button>
      </div>
    </div>
    ${target>1?`<div class="prog-bar" style="margin-top:8px"><div class="prog-fill" style="width:${pct}%"></div></div>`:''}
  </div>`;
}

function checkInHabit(id){
  const h=DB.habits.find(h=>h.id===id);if(!h)return;
  const key=getHabitLogKey(id,today());
  const current=DB.habitLogs[key]||0;
  const target=h.times||1;
  if(current<target)DB.habitLogs[key]=current+1;
  save();renderHome();if(window._curPage==='habits')renderHabits();
}

function getHabitStreak(h){
  let streak=0,d=new Date();
  for(let i=0;i<365;i++){
    const dateStr=d.toISOString().slice(0,10);
    const key=getHabitLogKey(h.id,dateStr);
    const done=DB.habitLogs[key]||0;
    const target=h.times||1;
    // check if habit was due that day
    const dow=d.getDay(),dom=d.getDate();
    let due=false;
    if(h.freq==='daily')due=true;
    else if(h.freq==='weekly')due=(h.weekdays||[]).includes(dow);
    else if(h.freq==='monthly')due=dom===(h.monthday||1);
    if(due){if(done>=target)streak++;else if(i>0)break;}
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function buildHeatmap(h){
  const cells=[];
  const d=new Date();d.setDate(d.getDate()-6*7+1);
  const weeks=[];let week=[];
  for(let i=0;i<7*7;i++){
    const dateStr=d.toISOString().slice(0,10);
    const key=getHabitLogKey(h.id,dateStr);
    const done=DB.habitLogs[key]||0,target=h.times||1;
    const lvl=done===0?0:done>=target?4:done>=target*0.75?3:done>=target*0.5?2:1;
    week.push(`<div class="heatmap-cell l${lvl}" title="${dateStr}: ${done}/${target}"></div>`);
    if(week.length===7){weeks.push(week);week=[];}
    d.setDate(d.getDate()+1);
  }
  if(week.length)weeks.push(week);

// ═══ TASKS ═══
function isTaskDueToday(t){
  if(!t.repeat)return false;
  const now=new Date(),dow=now.getDay(),dom=now.getDate();
  if(t.freq==='daily')return true;
  if(t.freq==='weekly')return (t.weekdays||[]).includes(dow);
  if(t.freq==='monthly')return dom===(t.monthday||1);
  return false;
}

function taskHTML(t){
  const p=DB.projects.find(p=>p.id===t.projectId),g=DB.goals.find(g=>g.id===t.goalId);
  const freqLabel=t.repeat?(t.freq==='daily'?T('freq_daily'):t.freq==='weekly'?T('freq_weekly'):T('freq_monthly')):'';
  return`<div class="task-item">
    <div class="task-cb ${t.done?'done':''} ${t.repeat?'repeat':''}" onclick="toggleTask('${t.id}')"></div>
    <div class="task-body">
      <div class="task-name ${t.done?'done':''}">${t.name}${t.tag?`<span class="task-tag">${t.tag}</span>`:''}</div>
      <div class="task-meta">${t.date?fmtD(t.date):''}${p?' · '+(p.emoji||'')+p.name:''}${g?' → '+g.name:''}${t.repeat?` <span class="task-repeat-badge">↺ ${freqLabel}</span>`:''}</div>
    </div>
    <div class="task-actions">
      <span class="task-act-btn" onclick="editTask('${t.id}')">${T('btn_edit')}</span>
      <span class="task-act-btn del" onclick="deleteTask('${t.id}')">${T('btn_del')}</span>
    </div>
  </div>`;
}

  el.innerHTML=sorted.length?sorted.map(e=>{const v=DB.virtualAccounts.find(v=>v.id===e.accountId),isIn=e.txType==='income_direct';return`<div class="exp-row"><div class="exp-icon ${isIn?'in-icon':''}">${isIn?'💰':(catIcons[e.category]||'📦')}</div><div class="exp-info"><div class="exp-name">${e.name}</div><div class="exp-detail">${fmtD(e.date)} · ${v?.name||''} ${e.note?'· '+e.note:''}</div></div><div style="display:flex;align-items:center;gap:7px"><div class="exp-amt ${isIn?'in':''}">${isIn?'+':'-'}${fmtM(e.amount)}</div><div class="exp-acts"><span class="icon-btn" onclick="editExpense('${e.id}')">${T('btn_edit')}</span><span class="icon-btn del" onclick="deleteExpense('${e.id}')">${T('btn_del')}</span></div></div></div>`;}).join(''):`<div class="empty"><div class="empty-icon">💸</div>${T('no_tx')}</div>`;
}
function toggleExpType(){const t=document.getElementById('e-type').value,af=document.getElementById('e-account-field');if(af)af.style.display=t==='income_direct'?'none':'';}
function saveExpense(){
  const name=document.getElementById('e-name').value.trim(),amount=parseFloat(document.getElementById('e-amount').value),txType=document.getElementById('e-type').value,accountId=document.getElementById('e-account').value;
  if(!name||!amount){alert(T('err_fill'));return;}
  if(txType!=='income_direct'&&!accountId){alert(T('err_acct'));return;}
  const editId=document.getElementById('e-edit-id').value;
  const data={name,amount,date:document.getElementById('e-date').value||today(),accountId,category:document.getElementById('e-cat').value,note:document.getElementById('e-note').value.trim(),txType};
  if(editId){const e=DB.expenses.find(e=>e.id===editId);if(e)Object.assign(e,data);}
  else DB.expenses.push({id:uid(),...data});
  save();closeModal('expense-modal');['e-name','e-amount','e-note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('e-edit-id').value='';
  renderVACs();renderExpenses();renderGoals();renderHome();
}
function editExpense(id){
  const e=DB.expenses.find(e=>e.id===id);if(!e)return;
  st('exp-modal-title',T('m_edit_tx'));
  document.getElementById('e-edit-id').value=id;
  document.getElementById('e-type').value=e.txType||'expense';
  document.getElementById('e-name').value=e.name;
  document.getElementById('e-amount').value=e.amount;
  document.getElementById('e-date').value=e.date||'';
  document.getElementById('e-cat').value=e.category||'other';
  document.getElementById('e-note').value=e.note||'';
  fillAccountSelects();document.getElementById('e-account').value=e.accountId||'';
  toggleExpType();openModal('expense-modal');
}
function deleteExpense(id){if(!confirm(T('c_del_tx')))return;DB.expenses=DB.expenses.filter(e=>e.id!==id);save();renderExpenses();renderVACs();renderGoals();renderHome();}
function saveDeposit(){
  const accountId=document.getElementById('dep-acct').value,amount=parseFloat(document.getElementById('dep-amt').value);
  if(!accountId||!amount){alert(T('err_all'));return;}
  const v=DB.virtualAccounts.find(v=>v.id===accountId);if(v)v.deposited+=amount;
  save();closeModal('deposit-modal');document.getElementById('dep-amt').value='';document.getElementById('dep-note').value='';
  renderVACs();renderHome();
}

// ═══ ASSETS ═══
function renderAssets(){
  document.getElementById('asset-list').innerHTML=DB.assets.map(a=>`<div class="acc-row"><div class="acc-dot" style="background:${a.color}"></div><span class="acc-name">${a.name}<span class="acc-code">${a.code}</span></span><span class="acc-val">${fmtM(a.amount)}</span></div>`).join('');
  const total=totalAssets(),target=DB.assetTarget||1000000,pct=total/target*100;
  document.getElementById('asset-total').textContent=fmtM(total);
  document.getElementById('asset-prog').style.width=Math.min(pct,100)+'%';
  document.getElementById('asset-prog-pct').textContent=pct.toFixed(1)+'%';
  document.getElementById('asset-prog-target').textContent=T('goal_col')+fmtM(target);
  const snaps=[...DB.snapshots].reverse().slice(0,6);
  document.getElementById('snap-list').innerHTML=snaps.length?snaps.map(s=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3)">${s.date}</span><span style="color:var(--c1)">${fmtM(s.total)}</span></div>`).join(''):`<div class="empty">${T('no_snaps')}</div>`;
}
function renderAssetInputs(){document.getElementById('asset-modal-inputs').innerHTML=DB.assets.map(a=>`<div class="field"><label>${a.name} (${a.code})</label><input type="number" id="ai-${a.id}" value="${a.amount}" step="any"></div>`).join('');}
function saveAssets(){DB.assets.forEach(a=>{const v=parseFloat(document.getElementById('ai-'+a.id)?.value)||0;a.amount=v;});DB.snapshots.push({date:new Date().toLocaleDateString('zh-TW'),total:totalAssets()});save();closeModal('asset-modal');renderAssets();renderHome();}

// ═══ INCOME ═══
let _lastCalc=null;
function updateIncTypes(){
  const src=document.getElementById('inc-src')?.value,te=document.getElementById('inc-type');if(!te)return;
  te.innerHTML=src==='parents'?`<option value="extra">${T('t_extra')}</option><option value="hongbao">${T('t_red')}</option>`:`<option value="salary">${T('t_salary')}</option><option value="bonus_annual">${T('t_year')}</option><option value="bonus_perf">${T('t_perf')}</option><option value="extra">${T('t_extra')}</option>`;
  calcIncome();
}
function calcIncome(){
  const raw=parseFloat(document.getElementById('inc-amt')?.value)||0;
  const src=document.getElementById('inc-src')?.value,type=document.getElementById('inc-type')?.value;
  const schemeId=document.getElementById('inc-scheme')?.value;
  const scheme=schemeId?getSchemeById(schemeId):getDefaultScheme();
  const rule=document.getElementById('inc-rule'),result=document.getElementById('inc-result');
  if(!rule||!result)return;
  const social=scheme.socialFixed??2000,filial=scheme.filialFixed??2000;
  if(type==='hongbao'){
    rule.textContent=T('rule_red');
    if(!raw){result.innerHTML='';return;}
    const sv=DB.virtualAccounts.find(v=>v.id==='v3')||DB.virtualAccounts[DB.virtualAccounts.length-1];
    _lastCalc=[{name:sv?.name||'儲蓄',id:sv?.id||'v3',amount:raw,pct:'100%',special:true}];
    result.innerHTML=resultHTML(_lastCalc,raw);return;
  }
  if(src==='parents')rule.textContent=T('rule_parents');
  else if(type==='salary')rule.textContent=T('rule_salary').replace('{s}',fmtM(social)).replace('{f}',fmtM(filial));
  else rule.textContent=T('rule_other');
  if(!raw){result.innerHTML='';return;}
  const rows=[];let rem=raw;
  DB.virtualAccounts.forEach(v=>{
    const pct=scheme.alloc?.[v.id]??v.pct;if(!pct||pct<=0)return;
    const amt=raw*pct;rows.push({name:v.name,id:v.id,amount:amt,pct:(pct*100).toFixed(1)+'%',special:false});rem-=amt;
  });
  // find social/filial/savings accounts by position if not enough accounts
  const lastV=DB.virtualAccounts[DB.virtualAccounts.length-1];
  const midV=DB.virtualAccounts.length>1?DB.virtualAccounts[DB.virtualAccounts.length-2]:lastV;
  if(src==='parents'){rows.push({name:midV?.name||'孝親',id:midV?.id,amount:rem,pct:'剩餘',special:true});}
  else if(type==='salary'){
    rows.push({name:'社交',id:'_social',amount:social,pct:T('fixed_lbl'),special:true});
    rows.push({name:midV?.name||'孝親',id:midV?.id,amount:filial,pct:T('fixed_lbl'),special:true});
    rows.push({name:lastV?.name||'儲蓄',id:lastV?.id,amount:Math.max(0,rem-social-filial),pct:'剩餘',special:true});
  }
  else rows.push({name:lastV?.name||'儲蓄',id:lastV?.id,amount:rem,pct:'剩餘',special:true});
  _lastCalc=rows;result.innerHTML=resultHTML(rows,raw);
}
function resultHTML(rows,total){
  return`<div>${rows.map(r=>`<div class="alloc-row"><div><div class="alloc-name">${r.name}</div><div class="alloc-pct">${r.pct}</div></div><div class="alloc-amt ${r.special?'special':''}">${fmtM(r.amount)}</div></div>`).join('')}</div><div class="total-strip"><span class="total-lbl">${T('total_in')}</span><span style="font-size:15px;font-weight:500;color:var(--c1)">${fmtM(total)}</span></div>`;
}
function applyIncome(){
  if(!_lastCalc?.length){alert(T('err_amt'));return;}
  _lastCalc.forEach(r=>{if(!r.id||r.id==='_social')return;const v=DB.virtualAccounts.find(v=>v.id===r.id);if(v)v.deposited+=r.amount;});
  const raw=parseFloat(document.getElementById('inc-amt')?.value)||0;
  const schemeId=document.getElementById('inc-scheme')?.value;
  const scheme=schemeId?getSchemeById(schemeId):getDefaultScheme();
  DB.incomeRecords.push({id:uid(),date:today(),amount:raw,source:document.getElementById('inc-src').value,type:document.getElementById('inc-type').value,schemeName:scheme.name,allocation:[..._lastCalc]});
  save();alert(T('ok_applied'));renderPage('cashflow');renderHome();renderIncomeRecords();
}
function renderIncomeRecords(){
  const el=document.getElementById('income-records');if(!el)return;
  const recs=[...DB.incomeRecords].reverse();
  el.innerHTML=recs.length?recs.slice(0,10).map(r=>`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div><span style="font-size:13.5px;font-weight:500">${fmtM(r.amount)}</span><span style="font-size:11px;color:var(--text3);margin-left:7px">${r.source} · ${r.type} · ${r.schemeName||''}</span></div><div style="display:flex;gap:5px;align-items:center"><span style="font-size:11px;color:var(--text3)">${fmtD(r.date)}</span><span class="icon-btn del" onclick="deleteIncomeRecord('${r.id}')">${T('btn_del')}</span></div></div>${r.allocation?`<div style="display:flex;flex-wrap:wrap;gap:4px">${r.allocation.map(a=>`<span style="font-size:10px;padding:1px 6px;border-radius:20px;background:var(--c3);color:var(--c1)">${a.name} ${fmtM(a.amount)}</span>`).join('')}</div>`:''}</div>`).join(''):`<div class="empty">${T('no_income')}</div>`;
}
function deleteIncomeRecord(id){if(!confirm(T('c_del_rec')))return;DB.incomeRecords=DB.incomeRecords.filter(r=>r.id!==id);save();renderIncomeRecords();}

// ═══ SCHEMES ═══
function fillSchemeAllocFields(){
  const el=document.getElementById('sch-alloc-fields');if(!el)return;
  el.innerHTML=`<div style="font-size:11px;color:var(--text3);margin:9px 0 5px">${T('lbl_sch_alloc')}</div>`+
  DB.virtualAccounts.map(v=>`<div class="input-row" style="align-items:center"><div class="field" style="flex:1;margin-bottom:5px"><label>${v.name}</label><input type="number" id="sch-a-${v.id}" placeholder="${(v.pct*100).toFixed(0)}" step="any" min="0" max="100"></div><span style="font-size:11px;color:var(--text3);padding-top:14px">%</span></div>`).join('');
  document.getElementById('sch-social').value=2000;document.getElementById('sch-filial').value=2000;
}
function addScheme(){st('scheme-modal-title',T('m_new_scheme'));document.getElementById('sch-edit-id').value='';document.getElementById('sch-name').value='';document.getElementById('sch-desc').value='';fillSchemeAllocFields();openModal('scheme-modal');}
function saveScheme(){
  const name=document.getElementById('sch-name').value.trim();if(!name){alert(T('err_scheme'));return;}
  const editId=document.getElementById('sch-edit-id').value;
  const alloc={};DB.virtualAccounts.forEach(v=>{const inp=document.getElementById('sch-a-'+v.id);if(inp&&inp.value)alloc[v.id]=parseFloat(inp.value)/100;});
  const data={name,desc:document.getElementById('sch-desc').value.trim(),socialFixed:parseFloat(document.getElementById('sch-social').value)||2000,filialFixed:parseFloat(document.getElementById('sch-filial').value)||2000,alloc};
  if(editId){const s=DB.schemes.find(s=>s.id===editId);if(s)Object.assign(s,data);}
  else DB.schemes.push({id:uid(),isDefault:DB.schemes.length===0,...data});
  save();closeModal('scheme-modal');renderSettings();fillSchemeSelect();
}
function setDefaultScheme(id){DB.schemes.forEach(s=>s.isDefault=(s.id===id));save();renderSettings();fillSchemeSelect();}
function deleteScheme(id){if(DB.schemes.length<=1){alert(T('keep_scheme'));return;}if(!confirm(T('c_del_scheme')))return;DB.schemes=DB.schemes.filter(s=>s.id!==id);if(!DB.schemes.find(s=>s.isDefault))DB.schemes[0].isDefault=true;save();renderSettings();fillSchemeSelect();}
function editScheme(id){
  const s=DB.schemes.find(s=>s.id===id);if(!s)return;
  st('scheme-modal-title',T('m_edit_scheme'));document.getElementById('sch-edit-id').value=id;
  document.getElementById('sch-name').value=s.name;document.getElementById('sch-desc').value=s.desc||'';
  fillSchemeAllocFields();
  setTimeout(()=>{if(s.alloc)Object.entries(s.alloc).forEach(([vid,pct])=>{const inp=document.getElementById('sch-a-'+vid);if(inp)inp.value=(pct*100).toFixed(1);});document.getElementById('sch-social').value=s.socialFixed||2000;document.getElementById('sch-filial').value=s.filialFixed||2000;},50);
  openModal('scheme-modal');
}

// ═══ SETTINGS ═══
function renderSettings(){
  const c=DB.colors||{};
  document.getElementById('sc1').value=c.c1||'#2B7FD4';document.getElementById('sc2').value=c.c2||'#5BAEE8';document.getElementById('sc3').value=c.c3||'#E8F3FB';
  document.getElementById('vac-settings').innerHTML=DB.virtualAccounts.map((v,i)=>`<div class="settings-row"><div class="settings-row-ctrl" style="gap:5px;flex:1;flex-wrap:wrap"><input type="text" value="${v.name}" id="vn-${i}" style="width:80px"><input type="number" value="${(v.pct*100).toFixed(0)}" id="vp-${i}" step="any" style="width:54px"><span style="font-size:10px;color:var(--text3)">${T('pct_hint')}</span><span style="font-size:17px;cursor:pointer;color:var(--text3)" onclick="removeVAC(${i})">×</span></div></div>`).join('');
  document.getElementById('scheme-settings').innerHTML=DB.schemes.map(s=>`<div class="scheme-card ${s.isDefault?'default-scheme':''}"><div class="scheme-name">${s.name}${s.isDefault?`<span class="scheme-badge">${T('badge_def')}</span>`:''}</div><div class="scheme-desc">${s.desc||''}</div><div class="scheme-actions">${!s.isDefault?`<button class="btn btn-sm" onclick="setDefaultScheme('${s.id}')">${T('btn_set_def')}</button>`:''}<button class="btn btn-sm" onclick="editScheme('${s.id}')">${T('btn_edit')}</button>${DB.schemes.length>1?`<button class="btn btn-sm btn-danger" onclick="deleteScheme('${s.id}')">${T('btn_del')}</button>`:''}</div></div>`).join('');
  document.getElementById('asset-settings').innerHTML=DB.assets.map((a,i)=>`<div class="settings-row"><div class="settings-row-ctrl" style="gap:5px;flex:1;flex-wrap:wrap"><input type="text" value="${a.code}" id="ac-${i}" style="width:32px"><input type="text" value="${a.name}" id="an-${i}" style="flex:1;min-width:90px"><input type="color" value="${a.color}" id="acol-${i}" style="width:34px;height:27px;padding:2px;cursor:pointer;border-radius:4px;border:1px solid var(--border2)"><span style="font-size:17px;cursor:pointer;color:var(--text3)" onclick="removeAsset(${i})">×</span></div></div>`).join('');
  document.getElementById('s-target').value=DB.assetTarget||1000000;
  const su=document.getElementById('s-user'),sb=document.getElementById('s-auth-btn');
  if(su)su.textContent=window._fbUser?(window._fbUser.displayName||window._fbUser.email):T('not_signed');
  if(sb)sb.textContent=window._fbUser?T('sign_out'):T('sign_in');
  const zh=document.getElementById('lang-zh'),en=document.getElementById('lang-en');
  if(zh)zh.className='lang-btn'+(_lang==='zh'?' active':'');if(en)en.className='lang-btn'+(_lang==='en'?' active':'');
}
function applyColors(){DB.colors={c1:document.getElementById('sc1').value,c2:document.getElementById('sc2').value,c3:document.getElementById('sc3').value};save();applyTheme();alert(T('ok_colors'));}
function addVAC(){DB.virtualAccounts.push({id:uid(),name:T('new_acct'),deposited:0,pct:0});save();renderSettings();}
function removeVAC(i){if(DB.virtualAccounts.length<=1){alert(T('keep_acct'));return;}if(!confirm(T('c_remove_acct')))return;DB.virtualAccounts.splice(i,1);save();renderSettings();}
function saveVACSettings(){DB.virtualAccounts.forEach((v,i)=>{const n=document.getElementById('vn-'+i)?.value.trim(),p=parseFloat(document.getElementById('vp-'+i)?.value)||0;if(n)v.name=n;v.pct=p/100;});save();alert(T('ok_saved'));renderSettings();}
function addAsset(){DB.assets.push({id:uid(),code:'?',name:T('new_acct'),amount:0,color:'#8AADC5'});save();renderSettings();}
function removeAsset(i){if(!confirm(T('c_remove_acct')))return;DB.assets.splice(i,1);save();renderSettings();}
function saveAssetSettings(){DB.assets.forEach((a,i)=>{const c=document.getElementById('ac-'+i)?.value.trim(),n=document.getElementById('an-'+i)?.value.trim(),col=document.getElementById('acol-'+i)?.value;if(c)a.code=c;if(n)a.name=n;if(col)a.color=col;});save();alert(T('ok_saved'));renderSettings();}
function saveTarget(){DB.assetTarget=parseFloat(document.getElementById('s-target').value)||1000000;save();alert(T('ok_saved'));}
