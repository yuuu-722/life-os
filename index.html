<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="theme-color" content="#2B7FD4">
<title>Life OS</title>
<link rel="manifest" href="#" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--c1:#2B7FD4;--c2:#5BAEE8;--c3:#E8F3FB;--bg:#EEF4FB;--bg3:#FFFFFF;--border:#D6E8F5;--border2:#C2D9EE;--text:#1A2E42;--text2:#4A6B85;--text3:#8AADC5;--red:#E05C5C;--green:#3BAD7A;--r:14px;--r-sm:9px;--font:'DM Sans',sans-serif;--font-d:'Playfair Display',serif;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
.app{display:grid;grid-template-columns:220px 1fr;height:100dvh;overflow:hidden}
.sidebar{background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:24px 20px 18px;border-bottom:1px solid var(--border);background:var(--c1)}
.sb-logo{font-family:var(--font-d);font-size:22px;color:#fff;font-style:italic}
.sb-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.sb-user{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2)}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-name{font-size:12px;color:rgba(255,255,255,.85);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-auth{font-size:11px;color:rgba(255,255,255,.55);cursor:pointer;white-space:nowrap;flex-shrink:0}
.sb-auth:hover{color:#fff}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-sec{margin-bottom:16px}
.nav-sec-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13.5px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--c3);color:var(--c1)}
.nav-item.active{background:var(--c3);color:var(--c1);font-weight:500}
.nav-item .ni{width:16px;text-align:center}
.sb-bottom{padding:12px 16px;border-top:1px solid var(--border)}
.sb-settings{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);cursor:pointer;padding:8px 6px;border-radius:var(--r-sm);transition:all .15s}
.sb-settings:hover{color:var(--c1);background:var(--c3)}
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 24px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left .page-title{font-family:var(--font-d);font-size:20px;font-style:italic}
.topbar-left .page-date{font-size:11px;color:var(--text3);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.page{display:none}.page.active{display:block}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:300}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:8px 0 4px}
.prog-fill{height:100%;border-radius:2px;background:var(--c1);transition:width .5s}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.chart-wrap{height:75px;margin:10px 0 4px}
.chart-wrap svg{width:100%;height:100%}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-cb{width:18px;height:18px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-cb.done{background:var(--green);border-color:var(--green)}
.task-cb.done::after{content:"✓";font-size:10px;color:#fff;font-weight:700}
.task-text{flex:1;font-size:14px}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--c3);color:var(--c1)}
.task-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s}
.task-item:hover .task-actions{opacity:1}
.task-act-btn{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px}
.task-act-btn:hover{background:var(--border);color:var(--text)}
.task-act-btn.del:hover{color:var(--red)}
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:15px;cursor:pointer;transition:border-color .2s,box-shadow .2s;position:relative}
.proj-card:hover{border-color:var(--c2);box-shadow:0 3px 12px rgba(43,127,212,.08)}
.proj-emoji{font-size:20px;margin-bottom:8px}
.proj-name{font-size:14px;font-weight:500;margin-bottom:2px}
.proj-meta{font-size:11px;color:var(--text3)}
.proj-bar{height:2px;background:var(--border);border-radius:1px;margin-top:10px}
.proj-fill{height:100%;border-radius:1px;background:var(--c1)}
.proj-status{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:7px}
.s-active{background:rgba(43,127,212,.1);color:var(--c1)}
.s-plan{background:rgba(91,174,232,.1);color:var(--c2)}
.s-done{background:rgba(59,173,122,.1);color:var(--green)}
.card-actions{display:flex;gap:6px;position:absolute;top:10px;right:10px;opacity:0;transition:opacity .15s}
.proj-card:hover .card-actions,.vision-card:hover .card-actions,.vac:hover .card-actions{opacity:1}
.ca-btn{font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.ca-btn:hover{border-color:var(--c1);color:var(--c1)}
.ca-del{color:var(--red);border-color:rgba(224,92,92,.3)}
.ca-del:hover{background:rgba(224,92,92,.05);border-color:var(--red)}
.vision-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .2s;position:relative}
.vision-card:hover{border-color:var(--c1)}
.vision-icon{font-size:24px;margin-bottom:8px}
.vision-title{font-size:14px;font-weight:500;margin-bottom:2px}
.vision-year{font-size:11px;color:var(--c1);font-weight:500}
.vision-desc{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.6}
.acc-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.acc-row:last-child{border-bottom:none}
.acc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.acc-name{flex:1;font-size:13px}
.acc-code{font-size:11px;color:var(--text3);margin-left:3px}
.acc-val{font-size:13px;font-weight:500}
.vac{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:15px;position:relative}
.vac-name{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.vac-bal{font-size:20px;font-weight:300}
.vac-sub{font-size:11px;color:var(--text3);margin-top:1px}
.vac-goals{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.vac-goal{margin-bottom:6px}
.vac-goal-hd{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.vac-gbar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.vac-gfill{height:100%;background:var(--c1);border-radius:1px}
.exp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border-bottom:none}
.exp-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--c3)}
.exp-icon.in-icon{background:rgba(59,173,122,.1)}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-detail{font-size:11px;color:var(--text3);margin-top:1px}
.exp-amt{font-size:13px;font-weight:500;color:var(--red);white-space:nowrap}
.exp-amt.in{color:var(--green)}
.exp-acts{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.exp-row:hover .exp-acts{opacity:1}
.alert-box{background:rgba(43,127,212,.06);border:1px solid rgba(43,127,212,.2);border-radius:var(--r-sm);padding:11px 14px;font-size:12.5px;color:var(--c1);line-height:1.6;margin-bottom:8px}
.total-strip{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0 0;border-top:1px solid var(--border2);margin-top:8px}
.total-lbl{font-size:12px;color:var(--text3)}
.total-val{font-family:var(--font-d);font-size:22px;color:var(--c1)}
.tab-nav{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab-btn{padding:8px 14px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab-btn:hover{color:var(--c1)}
.tab-btn.active{color:var(--c1);border-bottom-color:var(--c1)}
.tab-panel{display:none}.tab-panel.active{display:block}
.btn{padding:8px 16px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.btn:hover{border-color:var(--c1);color:var(--c1)}
.btn-primary{background:var(--c1);color:#fff;border-color:var(--c1)}
.btn-primary:hover{background:var(--c2);border-color:var(--c2);color:#fff}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(224,92,92,.3)}
.btn-danger:hover{background:rgba(224,92,92,.05);border-color:var(--red)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.icon-btn{padding:4px 10px;border-radius:var(--r-sm);font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.icon-btn:hover{border-color:var(--c1);color:var(--c1)}
.icon-btn.del{color:var(--red);border-color:rgba(224,92,92,.25)}
.icon-btn.del:hover{background:rgba(224,92,92,.05)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.field label{font-size:12px;color:var(--text3);font-weight:500}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--c1)}
.input-row{display:flex;gap:10px}.input-row .field{flex:1}
.quick-add{display:flex;gap:8px;margin-top:10px}
.quick-add input{flex:1}
.quick-add button{padding:8px 14px;background:var(--c1);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;cursor:pointer;font-family:var(--font)}
.modal-overlay{position:fixed;inset:0;background:rgba(26,46,66,.4);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:420px;max-width:calc(100vw - 28px);max-height:90dvh;overflow-y:auto;box-shadow:0 16px 48px rgba(43,127,212,.12)}
.modal-title{font-family:var(--font-d);font-size:19px;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1}
.settings-section{margin-bottom:24px}
.settings-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase}
.settings-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-info{flex:1}
.settings-row-lbl{font-size:13px}
.settings-row-sub{font-size:11px;color:var(--text3);margin-top:1px}
.settings-row-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.scheme-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:8px}
.scheme-card.default-scheme{border-color:var(--c1);background:rgba(43,127,212,.04)}
.scheme-name{font-size:13px;font-weight:500;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.scheme-badge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--c1);color:#fff}
.scheme-desc{font-size:11px;color:var(--text3)}
.scheme-actions{display:flex;gap:6px;margin-top:8px}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border);padding:6px 0;padding-bottom:max(6px,var(--safe-bot));z-index:100}
.mn-inner{display:flex;justify-content:space-around}
.mn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;cursor:pointer;font-size:10px;color:var(--text3);border-radius:var(--r-sm)}
.mn-item.active{color:var(--c1)}
.mn-icon{font-size:20px}
.login-screen{position:fixed;inset:0;background:var(--c1);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:20px;padding:24px}
.login-logo{font-family:var(--font-d);font-size:44px;color:#fff;font-style:italic}
.login-sub{font-size:14px;color:rgba(255,255,255,.75);text-align:center;line-height:1.7;white-space:pre-line}
.login-btn{display:flex;align-items:center;gap:12px;background:#fff;color:var(--text);padding:14px 28px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);box-shadow:0 6px 24px rgba(0,0,0,.15);transition:transform .15s}
.login-btn:hover{transform:translateY(-1px)}
.login-btn svg{width:20px;height:20px}
.login-offline{font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;text-decoration:underline}
.login-loading{font-size:13px;color:rgba(255,255,255,.7);display:none}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.35}
.lang-switch{display:flex;gap:6px}
.lang-btn{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--font);transition:all .15s}
.lang-btn.active{background:var(--c1);color:#fff;border-color:var(--c1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page.active>*{animation:fadeUp .2s ease both}
.page.active>*:nth-child(2){animation-delay:.04s}
.page.active>*:nth-child(3){animation-delay:.08s}
@media(max-width:768px){
  .app{grid-template-columns:1fr}.sidebar{display:none}
  .topbar{padding:10px 16px;padding-top:max(10px,var(--safe-top))}
  .content{padding:14px 14px 90px}
  .mobile-nav{display:block}
  .g2,.g3{grid-template-columns:1fr}
  .g-auto{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .task-actions{opacity:1}.card-actions{opacity:1;position:static;margin-top:8px}.exp-acts{opacity:1}
}
@media(min-width:769px){.topbar{display:none}.content{padding:26px 30px}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-logo">Life OS</div>
  <div class="login-sub" id="login-sub"></div>
  <button class="login-btn" id="loginBtn" onclick="doSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="login-google-text"></span>
  </button>
  <div class="login-loading" id="loginLoading"></div>
  <div class="login-offline" id="login-offline" onclick="skipLogin()"></div>
</div>
<div class="app" id="appShell" style="display:none">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">Life OS</div>
      <div class="sb-sub" id="sb-sub"></div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-av">?</div>
        <div class="sb-name" id="sb-nm"></div>
        <div class="sb-auth" id="sb-auth" onclick="handleAuth()"></div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-sec">
        <div class="nav-sec-label" id="nav-lbl-daily"></div>
        <div class="nav-item active" onclick="nav('home')"><span class="ni">⌂</span><span id="nav-home"></span></div>
        <div class="nav-item" onclick="nav('tasks')"><span class="ni">✓</span><span id="nav-tasks"></span></div>
      </div>
      <div class="nav-sec">
        <div class="nav-sec-label" id="nav-lbl-plans"></div>
        <div class="nav-item" onclick="nav('projects')"><span class="ni">◈</span><span id="nav-projects"></span></div>
        <div class="nav-item" onclick="nav('visions')"><span class="ni">◎</span><span id="nav-visions"></span></div>
      </div>
      <div class="nav-sec">
        <div class="nav-sec-label" id="nav-lbl-finance"></div>
        <div class="nav-item" onclick="nav('cashflow')"><span class="ni">⬡</span><span id="nav-cashflow"></span></div>
        <div class="nav-item" onclick="nav('assets')"><span class="ni">△</span><span id="nav-assets"></span></div>
        <div class="nav-item" onclick="nav('income')"><span class="ni">↑</span><span id="nav-income"></span></div>
      </div>
    </nav>
    <div class="sb-bottom">
      <div class="sb-settings" onclick="nav('settings')">⚙ <span id="nav-settings"></span></div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="tb-title"></div>
        <div class="page-date" id="tb-date"></div>
      </div>
      <button class="btn btn-primary btn-sm" id="tb-btn" onclick="topbarAct()" style="display:none"></button>
    </div>
    <div class="content">
      <div id="page-home" class="page active">

import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
const cfg={apiKey:"AIzaSyA2rHPAQT-eaJnvoUuNHBZdIo88b0Olhmk",authDomain:"life-os-01-byyu.firebaseapp.com",projectId:"life-os-01-byyu",storageBucket:"life-os-01-byyu.firebasestorage.app",messagingSenderId:"904924111847",appId:"1:904924111847:web:8301a7bf43e13f5ef0d342"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),provider=new GoogleAuthProvider();
const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
window._doSignIn=async()=>{document.getElementById('loginBtn').style.display='none';document.getElementById('loginLoading').style.display='block';try{if(isMobile){await signInWithRedirect(auth,provider);}else{await signInWithPopup(auth,provider);}}catch(e){console.error(e);document.getElementById('loginBtn').style.display='flex';document.getElementById('loginLoading').style.display='none';}};
getRedirectResult(auth).catch(e=>console.error(e));
window._doSignOut=async()=>{await signOut(auth);updateAuthUI(null);};
window._saveToFB=async(data)=>{if(!window._fbUser)return;try{await setDoc(doc(db,'users',window._fbUser.uid),JSON.parse(JSON.stringify(data)));}catch(e){console.error(e);}};
window._loadFromFB=async(uid)=>{try{const snap=await getDoc(doc(db,'users',uid));if(snap.exists()){const d=snap.data();window.DB={...window.DB,...d};applyTheme();applyLang();renderPage(window._curPage||'home');}}catch(e){console.error(e);}};
function updateAuthUI(user){
  const av=document.getElementById('sb-av'),nm=document.getElementById('sb-nm'),au=document.getElementById('sb-auth'),su=document.getElementById('s-user'),sb=document.getElementById('s-auth-btn');
  if(user){if(av)av.innerHTML=user.photoURL?`<img src="${user.photoURL}">`:(user.displayName?.[0]||'U');if(nm)nm.textContent=user.displayName||user.email;if(au)au.textContent=T('sign_out');if(su)su.textContent=user.displayName||user.email;if(sb)sb.textContent=T('sign_out');}

}
onAuthStateChanged(auth,user=>{window._fbUser=user;updateAuthUI(user);if(user){window._loadFromFB(user.uid);document.getElementById('loginScreen').style.display='none';showApp();}});
window.doSignIn=()=>window._doSignIn();
window.handleAuth=()=>window._fbUser?window._doSignOut():window._doSignIn();
</script>

function applyTheme(){
  const c=DB.colors||{},c1=c.c1||'#2B7FD4',c2=c.c2||'#5BAEE8',c3=c.c3||'#E8F3FB';
  const r=document.documentElement.style;
  r.setProperty('--c1',c1);r.setProperty('--c2',c2);r.setProperty('--c3',c3);r.setProperty('--bg',c3);
  r.setProperty('--border',mix(c1,'#ffffff',0.75));r.setProperty('--border2',mix(c1,'#ffffff',0.55));
  document.querySelector('meta[name=theme-color]').setAttribute('content',c1);
  const ls=document.getElementById('loginScreen');if(ls)ls.style.background=c1;
  const sbt=document.querySelector('.sb-top');if(sbt)sbt.style.background=c1;

function mix(h1,h2,t){const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];const[r1,g1,b1]=p(h1),[r2,g2,b2]=p(h2);return'#'+[Math.round(r1+(r2-r1)*t),Math.round(g1+(g2-g1)*t),Math.round(b1+(b2-b1)*t)].map(x=>x.toString(16).padStart(2,'0')).join('');}

function renderAssetChart(){
  const snaps=DB.snapshots.slice(-8),svg=document.getElementById('asset-svg');

  const vals=snaps.map(s=>s.total),max=Math.max(...vals),min=Math.min(...vals),range=max-min||1,W=400,H=55,pad=8;
  const pts=vals.map((v,i)=>{const x=pad+(W-pad*2)*i/(vals.length-1),y=H-pad-(v-min)/range*(H-pad*2);return`${x},${y}`;}).join(' ');

}

// INCOME
let _lastCalc=null;
function updateIncTypes(){const src=document.getElementById('inc-src')?.value,te=document.getElementById('inc-type');if(!te)return;te.innerHTML=src==='parents'?`<option value="extra">${T('t_extra')}</option><option value="hongbao">${T('t_red')}</option>`:`<option value="salary">${T('t_salary')}</option><option value="bonus_annual">${T('t_year')}</option><option value="bonus_perf">${T('t_perf')}</option><option value="extra">${T('t_extra')}</option>`;calcIncome();}
function calcIncome(){
  const raw=parseFloat(document.getElementById('inc-amt')?.value)||0;
  const src=document.getElementById('inc-src')?.value,type=document.getElementById('inc-type')?.value;
  const schemeId=document.getElementById('inc-scheme')?.value;
  const scheme=schemeId?getSchemeById(schemeId):getDefaultScheme();
  const rule=document.getElementById('inc-rule'),result=document.getElementById('inc-result');
  if(!rule||!result)return;
  const social=scheme.socialFixed??2000,filial=scheme.filialFixed??2000;
  if(type==='hongbao'){rule.textContent=T('rule_red');if(!raw){result.innerHTML='';return;}const savings=DB.virtualAccounts.find(v=>v.id==='v9');_lastCalc=[{name:savings?.name||'儲蓄',id:'v9',amount:raw,pct:'100%',special:true}];result.innerHTML=resultHTML(_lastCalc,raw);return;}
  if(src==='parents')rule.textContent=T('rule_parents');
  else if(type==='salary')rule.textContent=T('rule_salary').replace('{s}',fmtM(social)).replace('{f}',fmtM(filial));
  else rule.textContent=T('rule_other');
  if(!raw){result.innerHTML='';return;}
  const rows=[];let rem=raw;
  DB.virtualAccounts.forEach(v=>{const pct=scheme.alloc?.[v.id]??v.pct;if(!pct||pct<=0)return;const amt=raw*pct;rows.push({name:v.name,id:v.id,amount:amt,pct:(pct*100).toFixed(1)+'%',special:false});rem-=amt;});
  const v8=DB.virtualAccounts.find(v=>v.id==='v8'),v4=DB.virtualAccounts.find(v=>v.id==='v4'),v9=DB.virtualAccounts.find(v=>v.id==='v9');
  if(src==='parents')rows.push({name:v8?.name||'孝親',id:'v8',amount:rem,pct:'70%',special:true});
  else if(type==='salary'){rows.push({name:v4?.name||'社交',id:'v4',amount:social,pct:T('fixed_lbl'),special:true});rows.push({name:v8?.name||'孝親',id:'v8',amount:filial,pct:T('fixed_lbl'),special:true});rows.push({name:v9?.name||'儲蓄',id:'v9',amount:Math.max(0,rem-social-filial),pct:T('remainder'),special:true});}
  else rows.push({name:v9?.name||'儲蓄',id:'v9',amount:rem,pct:'70%',special:true});
  _lastCalc=rows;result.innerHTML=resultHTML(rows,raw);
}
function resultHTML(rows,total){return`<div>${rows.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;color:var(--text2)">${r.name}</div><div style="font-size:11px;color:var(--text3)">${r.pct}</div></div><div style="font-size:13px;font-weight:500;color:${r.special?'var(--green)':'var(--c1)'}">${fmtM(r.amount)}</div></div>`).join('')}</div><div class="total-strip"><span class="total-lbl">${T('total_in')}</span><span style="font-size:16px;font-weight:500;color:var(--c1)">${fmtM(total)}</span></div>`;}
function applyIncome(){if(!_lastCalc?.length){alert(T('err_amt'));return;}_lastCalc.forEach(r=>{const v=DB.virtualAccounts.find(v=>v.id===r.id);if(v)v.deposited+=r.amount;});save();saveIncome();alert(T('ok_applied'));renderPage('cashflow');renderHome();}
function saveIncome(){const raw=parseFloat(document.getElementById('inc-amt')?.value)||0;if(!raw)return;const schemeId=document.getElementById('inc-scheme')?.value;const scheme=schemeId?getSchemeById(schemeId):getDefaultScheme();DB.incomeRecords.push({id:uid(),date:today(),amount:raw,source:document.getElementById('inc-src').value,type:document.getElementById('inc-type').value,schemeName:scheme.name,allocation:_lastCalc?[..._lastCalc]:[]});save();renderIncomeRecords();}
function renderIncomeRecords(){const el=document.getElementById('income-records');if(!el)return;const recs=[...DB.incomeRecords].reverse();el.innerHTML=recs.length?recs.slice(0,10).map(r=>`<div style="padding:11px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><div><span style="font-size:14px;font-weight:500">${fmtM(r.amount)}</span><span style="font-size:11px;color:var(--text3);margin-left:8px">${r.source} · ${r.type} · ${r.schemeName||''}</span></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--text3)">${fmtD(r.date)}</span><span class="icon-btn del" onclick="deleteIncomeRecord('${r.id}')">${T('btn_del')}</span></div></div>${r.allocation?`<div style="display:flex;flex-wrap:wrap;gap:5px">${r.allocation.map(a=>`<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--c3);color:var(--c1)">${a.name} ${fmtM(a.amount)}</span>`).join('')}</div>`:''}</div>`).join(''):`<div class="empty">${T('no_income')}</div>`;}
function deleteIncomeRecord(id){if(!confirm(T('c_del_rec')))return;DB.incomeRecords=DB.incomeRecords.filter(r=>r.id!==id);save();renderIncomeRecords();}
// SCHEMES
function fillSchemeAllocFields(){const el=document.getElementById('sch-alloc-fields');if(!el)return;el.innerHTML=`<div style="font-size:12px;color:var(--text3);margin:10px 0 6px">${T('lbl_sch_alloc')}</div>`+DB.virtualAccounts.filter(v=>v.pct>0).map(v=>`<div class="input-row" style="align-items:center"><div class="field" style="flex:1;margin-bottom:6px"><label>${v.name}</label><input type="number" id="sch-a-${v.id}" placeholder="${(v.pct*100).toFixed(1)}" step="any" min="0" max="100"></div><span style="font-size:12px;color:var(--text3);padding-top:16px">%</span></div>`).join('');document.getElementById('sch-social').value=2000;document.getElementById('sch-filial').value=2000;}
function addScheme(){st('scheme-modal-title',T('m_new_scheme'));document.getElementById('sch-edit-id').value='';document.getElementById('sch-name').value='';document.getElementById('sch-desc').value='';fillSchemeAllocFields();openModal('scheme-modal');}
function saveScheme(){const name=document.getElementById('sch-name').value.trim();if(!name){alert(T('err_scheme'));return;}const editId=document.getElementById('sch-edit-id').value;const alloc={};DB.virtualAccounts.forEach(v=>{const inp=document.getElementById('sch-a-'+v.id);if(inp&&inp.value)alloc[v.id]=parseFloat(inp.value)/100;});const data={name,desc:document.getElementById('sch-desc').value.trim(),socialFixed:parseFloat(document.getElementById('sch-social').value)||2000,filialFixed:parseFloat(document.getElementById('sch-filial').value)||2000,alloc};if(editId){const s=DB.schemes.find(s=>s.id===editId);if(s)Object.assign(s,data);}else DB.schemes.push({id:uid(),isDefault:DB.schemes.length===0,...data});save();closeModal('scheme-modal');renderSettings();fillSchemeSelect();}
function setDefaultScheme(id){DB.schemes.forEach(s=>s.isDefault=(s.id===id));save();renderSettings();fillSchemeSelect();}
function deleteScheme(id){if(DB.schemes.length<=1){alert(T('keep_scheme'));return;}if(!confirm(T('c_del_scheme')))return;DB.schemes=DB.schemes.filter(s=>s.id!==id);if(!DB.schemes.find(s=>s.isDefault))DB.schemes[0].isDefault=true;save();renderSettings();fillSchemeSelect();}
function editScheme(id){const s=DB.schemes.find(s=>s.id===id);if(!s)return;st('scheme-modal-title',T('m_edit_scheme'));document.getElementById('sch-edit-id').value=id;document.getElementById('sch-name').value=s.name;document.getElementById('sch-desc').value=s.desc||'';fillSchemeAllocFields();setTimeout(()=>{if(s.alloc)Object.entries(s.alloc).forEach(([vid,pct])=>{const inp=document.getElementById('sch-a-'+vid);if(inp)inp.value=(pct*100).toFixed(1);});document.getElementById('sch-social').value=s.socialFixed||2000;document.getElementById('sch-filial').value=s.filialFixed||2000;},50);openModal('scheme-modal');}
// SETTINGS
function renderSettings(){
  const c=DB.colors||{};
  document.getElementById('sc1').value=c.c1||'#2B7FD4';document.getElementById('sc2').value=c.c2||'#5BAEE8';document.getElementById('sc3').value=c.c3||'#E8F3FB';
  document.getElementById('vac-settings').innerHTML=DB.virtualAccounts.map((v,i)=>`<div class="settings-row"><div class="settings-row-ctrl" style="gap:6px;flex:1;flex-wrap:wrap"><input type="text" value="${v.name}" id="vn-${i}" style="width:90px"><input type="number" value="${(v.pct*100)}" id="vp-${i}" step="any" style="width:60px"><span style="font-size:11px;color:var(--text3)">${T('pct_hint')}</span><span style="font-size:18px;cursor:pointer;color:var(--text3)" onclick="removeVAC(${i})">×</span></div></div>`).join('');
  document.getElementById('scheme-settings').innerHTML=DB.schemes.map(s=>`<div class="scheme-card ${s.isDefault?'default-scheme':''}"><div class="scheme-name">${s.name}${s.isDefault?`<span class="scheme-badge">${T('badge_def')}</span>`:''}</div><div class="scheme-desc">${s.desc||''}</div><div class="scheme-actions">${!s.isDefault?`<button class="btn btn-sm" onclick="setDefaultScheme('${s.id}')">${T('btn_set_def')}</button>`:''}<button class="btn btn-sm" onclick="editScheme('${s.id}')">${T('btn_edit')}</button>${DB.schemes.length>1?`<button class="btn btn-sm btn-danger" onclick="deleteScheme('${s.id}')">${T('btn_del')}</button>`:''}</div></div>`).join('');
  document.getElementById('asset-settings').innerHTML=DB.assets.map((a,i)=>`<div class="settings-row"><div class="settings-row-ctrl" style="gap:6px;flex:1;flex-wrap:wrap"><input type="text" value="${a.code}" id="ac-${i}" style="width:36px"><input type="text" value="${a.name}" id="an-${i}" style="flex:1;min-width:100px"><input type="color" value="${a.color}" id="acol-${i}" style="width:36px;height:30px;padding:2px;cursor:pointer;border-radius:4px;border:1px solid var(--border2)"><span style="font-size:18px;cursor:pointer;color:var(--text3)" onclick="removeAsset(${i})">×</span></div></div>`).join('');
  document.getElementById('s-target').value=DB.assetTarget||5800000;
  const su=document.getElementById('s-user'),sb=document.getElementById('s-auth-btn');
  if(su)su.textContent=window._fbUser?(window._fbUser.displayName||window._fbUser.email):T('not_signed');
  if(sb)sb.textContent=window._fbUser?T('sign_out'):T('sign_in');
  const zh=document.getElementById('lang-zh'),en=document.getElementById('lang-en');
  if(zh)zh.className='lang-btn'+(_lang==='zh'?' active':'');if(en)en.className='lang-btn'+(_lang==='en'?' active':'');
}
function applyColors(){DB.colors={c1:document.getElementById('sc1').value,c2:document.getElementById('sc2').value,c3:document.getElementById('sc3').value};save();applyTheme();alert(T('ok_colors'));}
function addVAC(){DB.virtualAccounts.push({id:uid(),name:T('new_acct'),deposited:0,pct:0});save();renderSettings();}
function removeVAC(i){if(DB.virtualAccounts.length<=1){alert(T('keep_acct'));return;}if(!confirm(T('c_remove_acct')))return;DB.virtualAccounts.splice(i,1);save();renderSettings();}
function saveVACSettings(){DB.virtualAccounts.forEach((v,i)=>{const n=document.getElementById('vn-'+i)?.value.trim(),p=parseFloat(document.getElementById('vp-'+i)?.value)||0;if(n)v.name=n;v.pct=p/100;});save();alert(T('ok_saved'));renderSettings();}
function addAsset(){DB.assets.push({id:uid(),code:'?',name:T('new_acct'),amount:0,color:'#8AADC5'});save();renderSettings();}
function removeAsset(i){if(!confirm(T('c_remove_acct')))return;DB.assets.splice(i,1);save();renderSettings();}
function saveAssetSettings(){DB.assets.forEach((a,i)=>{const c=document.getElementById('ac-'+i)?.value.trim(),n=document.getElementById('an-'+i)?.value.trim(),col=document.getElementById('acol-'+i)?.value;if(c)a.code=c;if(n)a.name=n;if(col)a.color=col;});save();alert(T('ok_saved'));renderSettings();}
function saveTarget(){DB.assetTarget=parseFloat(document.getElementById('s-target').value)||5800000;save();alert(T('ok_saved'));}
// INIT
function showApp(){
  document.getElementById('appShell').style.display='grid';
  document.getElementById('mobileNav').style.display='block';
  const td=document.getElementById('tb-date');if(td)td.textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  applyLang();applyTheme();renderHome();fillSchemeSelect();fillTypeSelects();
}
function skipLogin(){document.getElementById('loginScreen').style.display='none';showApp();}
const mf={name:'Life OS',short_name:'Life OS',start_url:'.',display:'standalone',background_color:'#EEF4FB',theme_color:'#2B7FD4',orientation:'portrait',icons:[{src:'https://em-content.zobj.net/source/google/387/house_1f3e0.png',sizes:'192x192',type:'image/png'}]};
document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));
applyLang();
</script>
